on:
  workflow_dispatch:
    inputs:
      org-name:
        description: Alias for the new scratch org
        type: string
        required: true
      


jobs:
  hello_world_job:
    name: A job to say hello
    runs-on: ubuntu-latest

    steps:        
      # Use the output from the `hello` step
      - name: Get the output time
        run: echo "The time was ${{ inputs.org-name }}"
      - name: test sf
        run: sf org:open
